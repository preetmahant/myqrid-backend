<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>myQRID — Your Digital Identity</title>
<meta name="description" content="One QR. Complete digital identity.">
<meta name="theme-color" content="#7C3AED">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/assets/myqrid-logo.png">
<meta property="og:title" content="myQRID — Your Digital Identity">
<meta property="og:description" content="One QR. Complete digital identity.">
<meta property="og:image" content="/assets/myqrid-logo.png">
<link rel="stylesheet" href="/css/glass.css">
<link rel="stylesheet" href="/css/responsive.css">
<script src="/js/logo.js"></script>
<style>
body{background:#1E1008;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:24px;text-align:center}
.splash-logo{animation:float 3s ease-in-out infinite;margin-bottom:32px}
.splash-title{font-size:2.5rem;font-weight:900;color:#fff;letter-spacing:-0.03em;margin-bottom:8px}
.splash-sub{color:rgba(255,255,255,0.45);font-size:1rem;margin-bottom:48px}
.btn-row{display:flex;flex-direction:column;gap:12px;width:100%;max-width:320px}
.divider-text{color:rgba(255,255,255,0.25);font-size:0.8rem;margin:4px 0}
.powered{position:fixed;bottom:24px;color:rgba(255,255,255,0.2);font-size:0.75rem}
</style>
</head>
<body data-top="coffee" data-bottom="deep-purple">

<div class="splash-logo">
  <img id="splash-logo" width="100" height="100" alt="myQRID" style="object-fit:contain">
</div>

<div class="splash-title">myQRID</div>
<div class="splash-sub">One QR. Complete Digital Identity.</div>

<div class="btn-row">
  <a href="/login.html" class="btn btn-accent btn-full">Login</a>
  <div class="divider-text">or</div>
  <a href="/signup.html" class="btn btn-dark-glass btn-full">Create Account</a>
  <a href="/claim.html" class="btn btn-ghost btn-full">Activate QR Code</a>
</div>

<div class="powered">Powered by myQRID</div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
document.getElementById('splash-logo').src = MYQRID_LOGO;

/* If logged in → dashboard */
const token = localStorage.getItem('myqrid_token');
if (token) window.location.href = '/dashboard.html';
</script>
</body>
</html>
