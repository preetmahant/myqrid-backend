<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sign Up — myQRID</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;min-height:100vh}
body{background:linear-gradient(135deg,#0a0a1a 0%,#1a0a2e 100%);font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;padding:20px;padding-top:env(safe-area-inset-top)}
.wrap{width:100%;max-width:400px}
.logo{text-align:center;margin-bottom:32px}
.logo-text{font-size:32px;font-weight:700;color:#FFD200;letter-spacing:-1px}
.logo-sub{font-size:14px;color:rgba(255,255,255,0.35);margin-top:6px}
.card{background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.10);border-radius:24px;padding:32px 28px}
.field{margin-bottom:16px}
label{display:block;font-size:12px;font-weight:600;color:rgba(255,255,255,0.4);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px}
input{width:100%;padding:14px 16px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.10);border-radius:12px;color:#F0F0F8;font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:all 0.2s}
input:focus{border-color:rgba(255,210,0,0.5);background:rgba(255,255,255,0.08)}
input.error{border-color:rgba(255,59,92,0.6)}
input::placeholder{color:rgba(255,255,255,0.2)}
.username-wrap{position:relative}
.username-wrap span{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.3);font-size:15px}
.username-wrap input{padding-left:28px}
.btn-gold{width:100%;padding:15px;background:#FFD200;color:#000;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;cursor:pointer;margin-top:4px;transition:all 0.2s;min-height:52px}
.btn-gold:active{transform:scale(0.98)}
.btn-gold:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.err-box{background:rgba(255,59,92,0.1);border:1px solid rgba(255,59,92,0.3);color:#FF3B5C;padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:rgba(255,255,255,0.2);font-size:13px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.08)}
.footer{text-align:center;margin-top:20px;font-size:14px;color:rgba(255,255,255,0.35)}
.footer a{color:#FFD200;text-decoration:none;font-weight:600}
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(100px);background:rgba(0,229,160,0.15);border:1px solid rgba(0,229,160,0.3);color:#00E5A0;padding:12px 24px;border-radius:50px;font-size:14px;font-weight:600;z-index:999;transition:transform 0.3s ease}
.toast.show{transform:translateX(-50%) translateY(0)}
.hint{font-size:11px;color:rgba(255,255,255,0.25);margin-top:6px}
.powered{text-align:center;margin-top:32px;font-size:11px;color:rgba(255,255,255,0.15)}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-text">myQRID</div>
    <div class="logo-sub">Create Your Digital Identity</div>
  </div>
  <div class="card">
    <div class="err-box" id="err"></div>
    <div class="field">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="Preet Mahant" autocomplete="name">
    </div>
    <div class="field">
      <label>Username</label>
      <div class="username-wrap">
        <span>@</span>
        <input type="text" id="username" placeholder="preetmahant" autocomplete="off" oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9_]/g,'')">
      </div>
      <div class="hint">Only lowercase letters, numbers, underscore</div>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Phone (optional)</label>
      <input type="tel" id="phone" placeholder="+91 98765 43210" autocomplete="tel">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="pass" placeholder="Min 6 characters" autocomplete="new-password">
    </div>
    <button class="btn-gold" id="btn" onclick="doSignup()">Create Account</button>
    <div class="divider">already have an account?</div>
    <a href="/login.html" style="display:block;text-align:center;color:#FFD200;text-decoration:none;font-weight:600;font-size:15px">Login →</a>
  </div>
  <div class="powered">Powered by myQRID</div>
</div>
<div class="toast" id="toast"></div>
<script>
const API = 'https://myqrid-backend.myqrid.workers.dev';

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function showErr(msg) {
  const e = document.getElementById('err');
  e.textContent = msg;
  e.style.display = 'block';
}

function clearErr() {
  document.getElementById('err').style.display = 'none';
}

async function doSignup() {
  clearErr();
  const name = document.getElementById('name').value.trim();
  const username = document.getElementById('username').value.trim();
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const pass = document.getElementById('pass').value;
  const btn = document.getElementById('btn');

  if (!name || !username || !email || !pass) {
    showErr('Please fill all required fields');
    return;
  }
  if (username.length < 3) {
    showErr('Username must be at least 3 characters');
    return;
  }
  if (pass.length < 6) {
    showErr('Password must be at least 6 characters');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Creating account...';

  try {
    const res = await fetch(API + '/auth/signup', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name, username, email, phone, password: pass})
    });
    const data = await res.json();
    if (data.token) {
      localStorage.setItem('token', data.token);
      localStorage.setItem('username', data.user.username);
      localStorage.setItem('name', data.user.name);
      showToast('Welcome to myQRID! 🎉');
      setTimeout(() => window.location.href = '/dashboard.html', 900);
    } else {
      showErr(data.error || 'Signup failed. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  } catch(e) {
    showErr('Network error. Please try again.');
    btn.disabled = false;
    btn.textContent = 'Create Account';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doSignup(); });

const token = localStorage.getItem('token');
if (token) {
  try {
    const p = JSON.parse(atob(token));
    if (p.exp > Date.now()) window.location.href = '/dashboard.html';
  } catch {}
}
</script>
</body>
</html>
