<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sign Up — myQRID</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/glass.css">
<style>
body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.wrap{width:100%;max-width:400px}
.logo{text-align:center;margin-bottom:32px}
.logo-text{font-size:32px;font-weight:700;color:#fff;letter-spacing:-1px}
.logo-text span{background:linear-gradient(135deg,#7c3aed,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:14px;color:rgba(255,255,255,0.35);margin-top:6px}
.card{padding:28px 24px}
.field{margin-bottom:16px}
.field-label{font-size:12px;font-weight:600;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.username-wrap{position:relative}
.username-wrap span{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.3);font-size:15px}
.username-wrap .input{padding-left:28px}
.btn-signup{width:100%;padding:15px;background:linear-gradient(135deg,#7c3aed,#ec4899);color:#fff;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;cursor:pointer;margin-top:4px;min-height:52px;transition:all 0.2s;box-shadow:0 0 25px rgba(124,58,237,0.3)}
.btn-signup:active{transform:scale(0.98)}
.btn-signup:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.login-row{text-align:center;margin-top:20px;font-size:14px;color:rgba(255,255,255,0.35)}
.login-row a{background:linear-gradient(135deg,#7c3aed,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;font-weight:600}
.hint{font-size:11px;color:rgba(255,255,255,0.25);margin-top:5px}
.powered{text-align:center;margin-top:24px;font-size:11px;color:rgba(255,255,255,0.15)}
</style>
</head>
<body>
<div class="bg-fixed"></div>
<div class="wrap">
  <div class="logo">
    <div class="logo-text">my<span>QRID</span></div>
    <div class="logo-sub">Create Your Digital Identity</div>
  </div>
  <div class="glass card">
    <div class="err-box" id="err"></div>
    <div class="field">
      <div class="field-label">Full Name</div>
      <input class="input" type="text" id="name" placeholder="Preet Mahant" autocomplete="name">
    </div>
    <div class="field">
      <div class="field-label">Username</div>
      <div class="username-wrap">
        <span>@</span>
        <input class="input" type="text" id="username" placeholder="preetmahant" autocomplete="off" oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9_]/g,'')">
      </div>
      <div class="hint">Only lowercase letters, numbers, underscore</div>
    </div>
    <div class="field">
      <div class="field-label">Email</div>
      <input class="input" type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
      <div class="field-label">Phone (optional)</div>
      <input class="input" type="tel" id="phone" placeholder="+91 98765 43210" autocomplete="tel">
    </div>
    <div class="field">
      <div class="field-label">Password</div>
      <input class="input" type="password" id="pass" placeholder="Min 6 characters" autocomplete="new-password">
    </div>
    <button class="btn-signup" id="btn" onclick="doSignup()">Create Account</button>
    <div class="login-row">
      Already have an account? <a href="/login.html">Login →</a>
    </div>
  </div>
  <div class="powered">Powered by myQRID</div>
</div>
<div class="toast" id="toast"></div>

<script>
const API = 'https://myqrid-backend.myqrid.workers.dev';

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function showErr(msg) {
  const e = document.getElementById('err');
  e.textContent = msg;
  e.style.display = 'block';
}

function clearErr() {
  document.getElementById('err').style.display = 'none';
}

async function doSignup() {
  clearErr();
  const name = document.getElementById('name').value.trim();
  const username = document.getElementById('username').value.trim();
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const pass = document.getElementById('pass').value;
  const btn = document.getElementById('btn');
  if (!name || !username || !email || !pass) { showErr('Please fill all required fields'); return; }
  if (username.length < 3) { showErr('Username must be at least 3 characters'); return; }
  if (pass.length < 6) { showErr('Password must be at least 6 characters'); return; }
  btn.disabled = true;
  btn.textContent = 'Creating account...';
  try {
    const res = await fetch(API + '/auth/signup', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name, username, email, phone, password: pass})
    });
    const data = await res.json();
    if (data.token) {
      localStorage.setItem('token', data.token);
      localStorage.setItem('username', data.user.username);
      localStorage.setItem('name', data.user.name);
      showToast('Welcome to myQRID! 🎉');
      setTimeout(() => window.location.href = '/dashboard.html', 900);
    } else {
      showErr(data.error || 'Signup failed. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  } catch(e) {
    showErr('Network error. Please try again.');
    btn.disabled = false;
    btn.textContent = 'Create Account';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doSignup(); });

const token = localStorage.getItem('token');
if (token) {
  try {
    const p = JSON.parse(atob(token));
    if (p.exp > Date.now()) window.location.href = '/dashboard.html';
  } catch {}
}
</script>
</body>
</html>
