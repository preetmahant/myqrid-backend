<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>myQRID Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0f;color:white;min-height:100vh}
.bg{position:fixed;width:100%;height:100%;background:radial-gradient(circle at 20% 20%,#7c3aed55,transparent),radial-gradient(circle at 80% 60%,#ec489955,transparent),#0a0a0f;z-index:-1}
.top{display:flex;justify-content:space-between;padding:15px;padding-top:calc(15px + env(safe-area-inset-top))}
.icon{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;border:1px solid rgba(255,255,255,0.08)}
.icon img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.icon i{color:rgba(255,255,255,0.7);font-size:16px}
.profile{text-align:center;padding:0 20px}
.avatar-wrap{position:relative;display:inline-block;margin-bottom:14px}
.avatar{width:110px;height:110px;border-radius:50%;border:3px solid #7c3aed;object-fit:cover;display:block;box-shadow:0 0 30px rgba(124,58,237,0.4)}
.avatar-placeholder{width:110px;height:110px;border-radius:50%;border:3px solid #7c3aed;background:linear-gradient(135deg,#7c3aed,#ec4899);display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:700;color:#fff;box-shadow:0 0 30px rgba(124,58,237,0.4);margin:0 auto}
.name{font-size:26px;font-weight:700;margin-bottom:6px}
.bio{color:#aaa;font-size:14px;margin-bottom:4px;line-height:1.5}
.username-tag{color:rgba(255,255,255,0.3);font-size:13px;margin-bottom:16px}
.social{display:flex;justify-content:center;gap:12px;margin:15px 0;flex-wrap:wrap}
.social a{width:42px;height:42px;border-radius:12px;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;color:white;text-decoration:none;border:1px solid rgba(255,255,255,0.08);transition:all 0.2s;font-size:18px}
.social a:active{background:rgba(124,58,237,0.2);border-color:rgba(124,58,237,0.4)}
.dashboard{display:flex;gap:10px;padding:15px;overflow-x:auto;scrollbar-width:none}
.dashboard::-webkit-scrollbar{display:none}
.card{min-width:130px;padding:14px;border-radius:16px;background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);text-align:center;cursor:pointer;border:1px solid rgba(255,255,255,0.07);font-size:14px;font-weight:600;transition:all 0.2s;flex-shrink:0}
.card:active{background:rgba(124,58,237,0.15);border-color:rgba(124,58,237,0.3)}
.links{padding:0 15px 15px}
.link{display:flex;align-items:center;padding:16px;margin:10px 0;border-radius:16px;text-decoration:none;color:white;font-weight:600;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);transition:all 0.2s;gap:12px}
.link:active{background:rgba(255,255,255,0.09)}
.link i{font-size:18px;width:20px;text-align:center}
.link-icon{width:36px;height:36px;border-radius:10px;background:rgba(124,58,237,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
.whatsapp-link{background:linear-gradient(135deg,#25D366,#1ebe5d)!important;border-color:transparent!important}
.save-wrap{padding:10px 15px 20px;text-align:center}
.save-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border-radius:50px;background:rgba(255,255,255,0.06);color:white;border:1px solid rgba(255,255,255,0.12);font-family:'Inter',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s}
.save-btn:active{background:rgba(124,58,237,0.2)}
.btn{display:block;text-align:center;padding:15px;margin:10px 15px;border-radius:16px;text-decoration:none;font-weight:600;font-size:15px}
.primary{background:linear-gradient(135deg,#7c3aed,#ec4899);color:white}
.secondary{background:rgba(255,255,255,0.05);color:white;border:1px solid rgba(255,255,255,0.08)}
.footer{text-align:center;padding:20px;opacity:0.25;font-size:12px}
.unclaimed{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;padding:40px 24px;text-align:center}
.unclaimed-icon{font-size:64px;margin-bottom:24px;animation:float 3s ease-in-out infinite}
.unclaimed-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:10px}
.unclaimed-sub{color:rgba(255,255,255,0.4);font-size:15px;margin-bottom:32px;line-height:1.6}
.activate-btn{display:inline-flex;align-items:center;gap:10px;padding:16px 32px;background:linear-gradient(135deg,#7c3aed,#ec4899);color:#fff;border:none;border-radius:16px;font-family:'Inter',sans-serif;font-size:16px;font-weight:700;cursor:pointer;text-decoration:none;box-shadow:0 0 30px rgba(124,58,237,0.4)}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
</style>
</head>
<body>
<div class="bg"></div>

<!-- TOP BAR -->
<div class="top">
  <div class="icon" id="topLeft">
    <i class="fas fa-hexagon"></i>
  </div>
  <div class="icon" onclick="shareProfile()">
    <i class="fas fa-share-nodes"></i>
  </div>
</div>

<!-- LOADING -->
<div id="loadingState" style="text-align:center;padding:60px 20px;color:rgba(255,255,255,0.3)">
  <div style="font-size:32px;margin-bottom:12px;animation:float 2s ease-in-out infinite">⬡</div>
  <div>Loading profile...</div>
</div>

<!-- PROFILE CONTENT -->
<div id="profileContent" style="display:none">

  <!-- PROFILE -->
  <div class="profile">
    <div class="avatar-wrap">
      <div class="avatar-placeholder" id="avatarEl">P</div>
    </div>
    <div class="name" id="nameEl">Loading...</div>
    <div class="bio" id="bioEl"></div>
    <div class="username-tag" id="usernameEl">@—</div>

    <!-- SOCIAL ICONS — only show if linked -->
    <div class="social" id="socialRow">
      <a id="wa-icon" href="#" style="display:none"><i class="fab fa-whatsapp"></i></a>
      <a id="insta-icon" href="#" style="display:none"><i class="fab fa-instagram"></i></a>
      <a id="twitter-icon" href="#" style="display:none"><i class="fab fa-x-twitter"></i></a>
      <a id="linkedin-icon" href="#" style="display:none"><i class="fab fa-linkedin"></i></a>
      <a id="youtube-icon" href="#" style="display:none"><i class="fab fa-youtube"></i></a>
      <a id="news-icon" href="#" style="display:none"><i class="fas fa-newspaper"></i></a>
    </div>
  </div>

  <!-- DASHBOARD SCROLL CARDS -->
  <div class="dashboard">
    <div class="card" onclick="openShop()">🛍 Products</div>
    <div class="card" onclick="openInsights()">📊 Insights</div>
    <div class="card" onclick="openSettings()">⚙️ Settings</div>
    <div class="card" onclick="copyURL()">🔗 Copy URL</div>
  </div>

  <!-- LINKTREE STYLE STRIPS -->
  <div class="links" id="linksSection"></div>

  <!-- WHATSAPP STRIP (if phone exists) -->
  <div id="waStrip" style="display:none;padding:0 15px">
    <a id="waStripLink" href="#" class="link whatsapp-link">
      <i class="fab fa-whatsapp"></i>
      <span>Chat on WhatsApp</span>
    </a>
  </div>

  <!-- SAVE CONTACT -->
  <div class="save-wrap">
    <button class="save-btn" onclick="saveContact()">
      <i class="fas fa-address-card"></i> Save Contact
    </button>
  </div>

  <!-- CTA -->
  <a href="/claim.html" class="btn primary">
    <i class="fas fa-qrcode"></i> Get Your myQRID
  </a>
  <a href="/login.html" class="btn secondary">
    <i class="fas fa-sign-in-alt"></i> Login / Sign Up
  </a>

  <div class="footer">Powered by myQRID</div>
</div>

<!-- UNCLAIMED STATE -->
<div id="unclaimedState" style="display:none">
  <div class="unclaimed">
    <div class="unclaimed-icon">⬡</div>
    <div class="unclaimed-title">This myQRID hasn't been activated yet</div>
    <div class="unclaimed-sub">Scan a myQRID tag to activate your digital identity and share your world in one tap.</div>
    <a href="/claim.html" class="activate-btn">
      <i class="fas fa-qrcode"></i> Activate This Identity
    </a>
  </div>
</div>

<script>
const API = 'https://myqrid-backend.myqrid.workers.dev';
let profileData = {};

function getUsernameFromURL() {
  const parts = window.location.pathname.split('/').filter(Boolean);
  return parts[parts.length - 1] || null;
}

function copyURL() {
  navigator.clipboard.writeText(window.location.href);
  alert('URL copied!');
}

function openShop() { alert('Products coming soon!'); }
function openInsights() { alert('Insights coming soon!'); }
function openSettings() {
  const token = localStorage.getItem('token');
  window.location.href = token ? '/dashboard.html' : '/login.html';
}

async function shareProfile() {
  const url = window.location.href;
  if (navigator.share) {
    navigator.share({ title: (profileData.display_name || 'myQRID') + ' — myQRID', url });
  } else {
    await navigator.clipboard.writeText(url);
    alert('Link copied!');
  }
}

function saveContact() {
  if (!profileData.display_name) return;
  const vcard = [
    'BEGIN:VCARD',
    'VERSION:3.0',
    'FN:' + profileData.display_name,
    profileData.phone ? 'TEL:' + profileData.phone : '',
    'URL:' + window.location.href,
    'NOTE:myQRID Profile',
    'END:VCARD'
  ].filter(Boolean).join('\n');
  const blob = new Blob([vcard], { type: 'text/vcard' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (profileData.username || 'contact') + '.vcf';
  a.click();
}

async function loadProfile() {
  const username = getUsernameFromURL();
  if (!username || username === 'profile') {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('unclaimedState').style.display = 'block';
    return;
  }

  document.title = '@' + username + ' — myQRID';

  try {
    const res = await fetch(API + '/profile/' + username);
    const data = await res.json();
    document.getElementById('loadingState').style.display = 'none';

    if (!data.success || !data.claimed) {
      document.getElementById('unclaimedState').style.display = 'block';
      return;
    }

    profileData = data;
    document.getElementById('profileContent').style.display = 'block';
    document.title = (data.display_name || username) + ' — myQRID';

    // Avatar
    const initial = (data.display_name || username)[0].toUpperCase();
    const avatarEl = document.getElementById('avatarEl');
    if (data.avatar) {
      avatarEl.outerHTML = `<img class="avatar" src="${data.avatar}" alt="${initial}" id="avatarEl">`;
    } else {
      avatarEl.textContent = initial;
    }

    // Info
    document.getElementById('nameEl').textContent = data.display_name || username;
    document.getElementById('bioEl').textContent = data.bio || '';
    document.getElementById('usernameEl').textContent = '@' + data.username;

    // Social icons — only show if user has linked them
    const socials = data.socials || {};
    if (socials.whatsapp || data.phone) {
      const phone = (socials.whatsapp || data.phone).replace(/\s/g, '');
      const el = document.getElementById('wa-icon');
      el.href = 'https://wa.me/' + phone;
      el.style.display = 'flex';
      // WhatsApp strip
      document.getElementById('waStrip').style.display = 'block';
      document.getElementById('waStripLink').href = 'https://wa.me/' + phone;
    }
    if (socials.instagram) {
      const el = document.getElementById('insta-icon');
      el.href = 'https://instagram.com/' + socials.instagram;
      el.style.display = 'flex';
    }
    if (socials.twitter) {
      const el = document.getElementById('twitter-icon');
      el.href = 'https://twitter.com/' + socials.twitter;
      el.style.display = 'flex';
    }
    if (socials.linkedin) {
      const el = document.getElementById('linkedin-icon');
      el.href = 'https://linkedin.com/in/' + socials.linkedin;
      el.style.display = 'flex';
    }
    if (socials.youtube) {
      const el = document.getElementById('youtube-icon');
      el.href = socials.youtube;
      el.style.display = 'flex';
    }

    // Linktree style link strips
    const container = document.getElementById('linksSection');
    if (data.links && data.links.length) {
      data.links.forEach(link => {
        const a = document.createElement('a');
        a.className = 'link';
        a.href = link.url || '#';
        a.target = '_blank';
        a.innerHTML = `<div class="link-icon">${link.icon || '🔗'}</div><span>${link.title || link.url}</span>`;
        container.appendChild(a);
      });
    }

    // Call strip
    if (data.phone) {
      const callEl = document.createElement('div');
      callEl.style.padding = '0 15px';
      callEl.innerHTML = `<a href="tel:${data.phone}" class="link"><i class="fas fa-phone"></i><span>Call ${data.display_name}</span></a>`;
      container.appendChild(callEl);
    }

  } catch(e) {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('unclaimedState').style.display = 'block';
  }
}

loadProfile();
</script>
</body>
</html>
