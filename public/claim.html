<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Activate myQRID</title>
<meta name="theme-color" content="#7C3AED">
<link rel="icon" href="/assets/myqrid-logo.png">
<link rel="stylesheet" href="/css/glass.css">
<link rel="stylesheet" href="/css/responsive.css">
<script src="/js/logo.js"></script>
<style>
body{background:#1E1008;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.claim-logo{margin-bottom:24px;animation:float 3s ease-in-out infinite}
.claim-title{font-size:1.75rem;font-weight:900;color:#fff;letter-spacing:-0.02em;margin-bottom:8px}
.claim-sub{color:rgba(255,255,255,0.45);font-size:0.9rem;margin-bottom:40px;line-height:1.5}
.claim-box{width:100%;max-width:360px}
.code-input{width:100%;min-height:64px;background:rgba(0,0,0,0.40);border:2px solid rgba(255,255,255,0.15);border-radius:16px;color:#fff;font-size:1.5rem;font-family:'Courier New',monospace;font-weight:700;text-align:center;letter-spacing:0.15em;outline:none;transition:all 0.2s;padding:0 16px;text-transform:uppercase}
.code-input:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-dim)}
.code-input.error{border-color:#FF3B5C;animation:shake 0.4s ease}
.code-input.success{border-color:#00E5A0}
.code-hint{font-size:0.78rem;color:rgba(255,255,255,0.3);margin-top:8px;margin-bottom:24px}
.error-msg{color:#FF3B5C;font-size:0.85rem;margin-top:12px;min-height:20px}
.back-link{margin-top:24px;color:rgba(255,255,255,0.3);font-size:0.85rem;cursor:pointer;text-decoration:none}
.back-link:hover{color:rgba(255,255,255,0.6)}
.steps{display:flex;flex-direction:column;gap:12px;margin:32px 0;text-align:left;width:100%;max-width:360px}
.step{display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(255,255,255,0.04);border-radius:12px;border:1px solid rgba(255,255,255,0.06)}
.step-num{width:28px;height:28px;border-radius:50%;background:var(--accent-dim);border:1px solid var(--accent-border);color:#DDD6FE;font-size:0.8rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-text{font-size:0.85rem;color:rgba(255,255,255,0.6)}
</style>
</head>
<body data-top="coffee" data-bottom="deep-purple">

<div class="claim-logo">
  <img id="claim-logo" width="80" height="80" alt="myQRID" style="object-fit:contain">
</div>

<div class="claim-title">Activate Your myQRID</div>
<div class="claim-sub">Enter the 12-character code printed on your QR tag, card, or sticker</div>

<div class="claim-box">
  <input
    id="code-input"
    class="code-input"
    type="text"
    placeholder="A7K9P2 X8RT24"
    maxlength="13"
    autocomplete="off"
    autocorrect="off"
    spellcheck="false"
    inputmode="text"
  >
  <div class="code-hint">Format: 6 characters · space · 6 characters</div>
  <button id="activate-btn" class="btn btn-accent btn-full" onclick="activate()">
    ✦ Activate This Identity
  </button>
  <div class="error-msg" id="error-msg"></div>
</div>

<div class="steps">
  <div class="step">
    <div class="step-num">1</div>
    <div class="step-text">Find the code on your myQRID tag, card, or packaging</div>
  </div>
  <div class="step">
    <div class="step-num">2</div>
    <div class="step-text">Enter it above and tap Activate</div>
  </div>
  <div class="step">
    <div class="step-num">3</div>
    <div class="step-text">Set up your profile — it goes live instantly</div>
  </div>
</div>

<a href="/" class="back-link">← Back to home</a>

<div id="toast-container"></div>

<script src="/js/app.js"></script>
<script>
document.getElementById('claim-logo').src = MYQRID_LOGO;

const input = document.getElementById('code-input');
const errMsg = document.getElementById('error-msg');

/* Auto format: XXXXXX XXXXXX */
input.addEventListener('input', () => {
  let val = input.value.replace(/[^A-Z0-9]/gi,'').toUpperCase();
  if (val.length > 6) val = val.slice(0,6) + ' ' + val.slice(6,12);
  input.value = val;
  input.classList.remove('error');
  errMsg.textContent = '';
});

input.addEventListener('keydown', e => {
  if (e.key === 'Enter') activate();
});

async function activate() {
  const raw = input.value.replace(/\s/g,'');
  errMsg.textContent = '';

  if (raw.length !== 12) {
    input.classList.add('error');
    errMsg.textContent = 'Please enter all 12 characters';
    return;
  }

  const btn = document.getElementById('activate-btn');
  btnLoad(btn, true);

  /* Check if logged in */
  if (!Auth.get()) {
    localStorage.setItem('pending_code', raw);
    window.location.href = `/signup.html?code=${raw}`;
    return;
  }

  const { ok, data, error } = await apiFetch('/claim', {
    method: 'POST',
    body: JSON.stringify({ code: raw })
  });

  btnLoad(btn, false);

  if (ok) {
    input.classList.add('success');
    toast('Successfully activated!', 'success');
    setTimeout(() => window.location.href = '/dashboard.html', 1200);
  } else {
    input.classList.add('error');
    errMsg.textContent = error || 'Invalid code. Please check and try again.';
  }
}
</script>
</body>
</html>
