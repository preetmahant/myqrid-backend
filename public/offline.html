<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Offline — myQRID</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/glass.css">
<style>
body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.wrap{width:100%;max-width:420px;text-align:center}
.icon{font-size:80px;margin-bottom:24px;animation:float 3s ease-in-out infinite;display:block}
.title{font-size:24px;font-weight:700;color:#fff;margin-bottom:10px}
.sub{font-size:15px;color:rgba(255,255,255,0.4);margin-bottom:32px;line-height:1.6}
.btn-primary{display:flex;align-items:center;justify-content:center;gap:10px;padding:15px 32px;background:linear-gradient(135deg,#7c3aed,#ec4899);color:#fff;border:none;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;cursor:pointer;text-decoration:none;box-shadow:0 0 30px rgba(124,58,237,0.3);width:100%}
.status{display:inline-flex;align-items:center;gap:8px;background:rgba(255,59,92,0.1);border:1px solid rgba(255,59,92,0.2);border-radius:50px;padding:8px 20px;font-size:13px;color:#FF3B5C;font-weight:600;margin-bottom:32px}
.dot{width:8px;height:8px;background:#FF3B5C;border-radius:50%;animation:emergencyPulse 1s ease-in-out infinite}
</style>
</head>
<body>
<div class="bg-fixed"></div>
<div class="wrap">
  <span class="icon">📡</span>
  <div class="status">
    <div class="dot"></div>
    No Internet Connection
  </div>
  <div class="title">You're Offline</div>
  <div class="sub">Check your connection and try again. myQRID needs internet to show your digital identity.</div>
  <button class="btn-primary" onclick="window.location.reload()">
    ↺ Try Again
  </button>
</div>
</body>
</html>
