<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Offline — myQRID</title>
<meta name="theme-color" content="#7C3AED">
<link rel="icon" href="/assets/myqrid-logo.png">
<link rel="stylesheet" href="/css/glass.css">
<link rel="stylesheet" href="/css/responsive.css">
<script src="/js/logo.js"></script>
<style>
body{background:#1E1008;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.offline-icon{font-size:5rem;margin-bottom:24px;animation:float 3s ease-in-out infinite}
.offline-title{font-size:1.5rem;font-weight:900;color:#fff;margin-bottom:8px}
.offline-sub{color:rgba(255,255,255,0.4);font-size:0.9rem;margin-bottom:32px;line-height:1.5}
.offline-logo{margin-bottom:16px}
.pulse-ring{width:80px;height:80px;border-radius:50%;border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;animation:pulse 2s ease infinite;margin:0 auto 24px}
</style>
</head>
<body data-top="coffee" data-bottom="deep-purple">

<div class="offline-logo">
  <img id="off-logo" width="60" height="60" alt="myQRID" style="object-fit:contain">
</div>

<div class="pulse-ring">
  <span style="font-size:2rem">📡</span>
</div>

<div class="offline-title">You're offline</div>
<div class="offline-sub">
  No internet connection detected.<br>
  Some features may not be available.
</div>

<button class="btn btn-accent" onclick="tryReconnect()" style="min-width:200px">
  Try Again
</button>

<div style="margin-top:16px">
  <a href="/" class="btn btn-ghost">Go Home</a>
</div>

<div style="margin-top:48px;color:rgba(255,255,255,0.15);font-size:0.75rem">
  Powered by myQRID
</div>

<div id="toast-container"></div>
<script src="/js/app.js"></script>
<script>
document.getElementById('off-logo').src = MYQRID_LOGO;

function tryReconnect() {
  if (navigator.onLine) {
    window.history.back();
  } else {
    toast('Still offline. Check your connection.', 'error');
  }
}

window.addEventListener('online', () => {
  toast('Back online!', 'success');
  setTimeout(() => window.history.back(), 1000);
});
</script>
</body>
</html>
