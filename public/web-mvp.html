<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d0621">
  <title>myQRID — Scan. Connect. Share.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body data-theme="dark-mesh">

  <div class="aurora" aria-hidden="true"></div>

  <!-- ── Home view ── -->
  <div id="view-home" class="view active">
    <div class="shell">
      <header class="topbar glass-panel">
        <div class="brand-lockup">
          <span class="brand-dot"></span>
          myQRID
        </div>
      </header>

      <section class="hero-section">
        <h1 class="hero-title">Scan.<br>Connect.<br>Share.</h1>
        <p class="hero-sub">Your smart digital identity &mdash; one QR away.</p>
      </section>

      <nav class="action-menu" aria-label="Main navigation">

        <button class="action-tile" data-href="/u/me">
          <span class="action-icon">
            <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
          </span>
          <span class="action-label">User Digital Profile</span>
          <svg class="action-arrow" viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
        </button>

        <button class="action-tile" data-href="/products">
          <span class="action-icon">
            <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/></svg>
          </span>
          <span class="action-label">Earn + My Products</span>
          <svg class="action-arrow" viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
        </button>

        <button class="action-tile" data-href="/scan">
          <span class="action-icon">
            <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M9.5 6.5v3h-3v-3h3M11 5H5v6h6V5zm-1.5 9.5v3h-3v-3h3M11 13H5v6h6v-6zm6.5-6.5v3h-3v-3h3M20 5h-6v6h6V5zm-6 8h1.5v1.5H14V13zm1.5 1.5H17V16h-1.5v-1.5zM17 13h1.5v1.5H17V13zm-3 3h1.5v1.5H14V16zm1.5 1.5H17V19h-1.5v-1.5zM17 16h1.5v1.5H17V16zm1.5-1.5H20V16h-1.5v-1.5zm0 3H20V19h-1.5v-1.5zM22 7h-2V4h-3V2h5v5zm0 15v-5h-2v3h-3v2h5zM2 22h5v-2H4v-3H2v5zM2 2v5h2V4h3V2H2z"/></svg>
          </span>
          <span class="action-label">Scan &amp; Pay</span>
          <svg class="action-arrow" viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
        </button>

        <button class="action-tile" data-href="/analytics">
          <span class="action-icon">
            <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
          </span>
          <span class="action-label">Analytics + Quick Actions</span>
          <svg class="action-arrow" viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
        </button>

        <button class="action-tile" data-href="/rewards">
          <span class="action-icon">
            <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M12 1L3 5v6c0 5.5 3.8 10.7 9 12 5.2-1.3 9-6.5 9-12V5l-9-4zm0 4l5 2.2V11c0 3.5-2.3 6.8-5 7.9-2.7-1.1-5-4.4-5-7.9V7.2L12 5z"/></svg>
          </span>
          <span class="action-label">Rewards &amp; Earn</span>
          <svg class="action-arrow" viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
        </button>

      </nav>
    </div>
  </div>

  <!-- ── Profile view ── -->
  <div id="view-profile" class="view">
    <div class="shell">
      <div id="profileContainer"></div>
    </div>
  </div>

  <!-- ── Placeholder (Phase 2 pages) ── -->
  <div id="view-placeholder" class="view">
    <div class="shell">
      <div class="placeholder-page glass-panel">
        <svg viewBox="0 0 24 24" fill="none" stroke="rgba(168,85,247,0.7)" stroke-width="1.5" width="48" height="48"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/><circle cx="12" cy="12" r="10"/></svg>
        <h2 id="placeholder-title">Coming soon</h2>
        <p id="placeholder-msg">This section is in Phase 2.</p>
        <button class="action-button" id="placeholder-back">Back to home</button>
      </div>
    </div>
  </div>

  <!-- ── Bottom nav (rendered by bottom-nav.js) ── -->
  <div id="bottomNav"></div>

  <script src="/components/toast.js"></script>
  <script src="/components/bottom-nav.js"></script>
  <script src="/components/profile-card.js"></script>
  <script src="/web-mvp.js"></script>
</body>
</html>
