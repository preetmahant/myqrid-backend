<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login — myQRID</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0f;color:white;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.bg{position:fixed;width:100%;height:100%;background:radial-gradient(circle at 20% 20%,#7c3aed55,transparent),radial-gradient(circle at 80% 60%,#ec489955,transparent),#0a0a0f;z-index:-1}
.wrap{width:100%;max-width:400px}
.logo{text-align:center;margin-bottom:40px}
.logo-text{font-size:32px;font-weight:700;color:#fff;letter-spacing:-1px}
.logo-text span{background:linear-gradient(135deg,#7c3aed,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:14px;color:rgba(255,255,255,0.35);margin-top:6px}
.card{background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:28px 24px}
.field{margin-bottom:18px}
.field-label{font-size:12px;font-weight:600;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.input{width:100%;padding:14px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:12px;color:#fff;font-family:'Inter',sans-serif;font-size:15px;outline:none;transition:border 0.2s}
.input:focus{border-color:rgba(124,58,237,0.5);background:rgba(124,58,237,0.05)}
.input::placeholder{color:rgba(255,255,255,0.2)}
.input.error{border-color:rgba(255,59,92,0.6)}
.pass-wrap{position:relative}
.pass-wrap .input{padding-right:48px}
.pass-eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,0.3);cursor:pointer;font-size:15px;padding:4px;transition:color 0.2s}
.pass-eye:hover{color:rgba(255,255,255,0.6)}
.forgot{text-align:right;margin-top:6px}
.forgot a{font-size:12px;color:rgba(255,255,255,0.3);text-decoration:none;transition:color 0.2s}
.forgot a:hover{color:rgba(124,58,237,0.8)}
.btn-login{width:100%;padding:15px;background:linear-gradient(135deg,#7c3aed,#ec4899);color:#fff;border:none;border-radius:12px;font-family:'Inter',sans-serif;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px;min-height:52px;transition:all 0.2s;box-shadow:0 4px 20px rgba(124,58,237,0.3)}
.btn-login:active{transform:scale(0.98);opacity:0.9}
.btn-login:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:rgba(255,255,255,0.2);font-size:13px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.07)}
.btn-ghost{display:flex;align-items:center;justify-content:center;width:100%;padding:14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;color:rgba(255,255,255,0.7);font-family:'Inter',sans-serif;font-size:15px;font-weight:500;cursor:pointer;text-decoration:none;min-height:52px;transition:all 0.2s}
.btn-ghost:active{background:rgba(255,255,255,0.08)}
.footer-link{text-align:center;margin-top:20px;font-size:14px;color:rgba(255,255,255,0.3)}
.footer-link a{background:linear-gradient(135deg,#7c3aed,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;font-weight:600}
.err-box{background:rgba(255,59,92,0.08);border:1px solid rgba(255,59,92,0.25);color:#FF3B5C;padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none}
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(124,58,237,0.12);border:1px solid rgba(124,58,237,0.25);color:#c4b5fd;padding:12px 24px;border-radius:50px;font-size:14px;font-weight:600;z-index:999;opacity:0;transition:all 0.3s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.powered{text-align:center;margin-top:32px;font-size:11px;color:rgba(255,255,255,0.12)}
</style>
</head>
<body>
<div class="bg"></div>
<div class="wrap">
  <div class="logo">
    <div class="logo-text">my<span>QRID</span></div>
    <div class="logo-sub">Your Digital Identity</div>
  </div>
  <div class="card">
    <div class="err-box" id="err"></div>
    <div class="field">
      <div class="field-label">Email</div>
      <input class="input" type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
      <div class="field-label">Password</div>
      <div class="pass-wrap">
        <input class="input" type="password" id="pass" placeholder="••••••••" autocomplete="current-password">
        <button class="pass-eye" onclick="togglePass('pass','eyeIcon')" type="button">
          <i class="fas fa-eye" id="eyeIcon"></i>
        </button>
      </div>
      <div class="forgot"><a href="/forgot.html">Forgot password?</a></div>
    </div>
    <button class="btn-login" id="btn" onclick="doLogin()">
      <i class="fas fa-sign-in-alt"></i> Login
    </button>
    <div class="divider">or</div>
    <a href="/signup.html" class="btn-ghost">
      <i class="fas fa-user-plus" style="margin-right:8px"></i> Create Account
    </a>
  </div>
  <div class="footer-link">
    <a href="/claim.html">🔖 Activate a myQRID Tag</a>
  </div>
  <div class="powered">Powered by myQRID</div>
</div>
<div class="toast" id="toast"></div>

<script>
const API = 'https://myqrid-backend.myqrid.workers.dev';

function togglePass(inputId, iconId) {
  const input = document.getElementById(inputId);
  const icon = document.getElementById(iconId);
  if (input.type === 'password') {
    input.type = 'text';
    icon.className = 'fas fa-eye-slash';
  } else {
    input.type = 'password';
    icon.className = 'fas fa-eye';
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function showErr(msg) {
  const e = document.getElementById('err');
  e.textContent = msg;
  e.style.display = 'block';
}

function clearErr() {
  document.getElementById('err').style.display = 'none';
}

async function doLogin() {
  clearErr();
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('pass').value;
  const btn = document.getElementById('btn');
  if (!email || !pass) { showErr('Please fill all fields'); return; }
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
  try {
    const res = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email, password: pass})
    });
    const data = await res.json();
    if (data.token) {
      localStorage.setItem('token', data.token);
      localStorage.setItem('username', data.user.username);
      localStorage.setItem('name', data.user.name);
      showToast('Welcome back! 👋');
      setTimeout(() => {
        const pending = localStorage.getItem('pending_code');
        window.location.href = pending ? '/claim.html' : '/dashboard.html';
      }, 800);
    } else {
      showErr(data.error || 'Invalid email or password');
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
    }
  } catch(e) {
    showErr('Network error. Please try again.');
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

const token = localStorage.getItem('token');
if (token) {
  try {
    const p = JSON.parse(atob(token));
    if (p.exp > Date.now()) window.location.href = '/dashboard.html';
  } catch {}
}
</script>
</body>
</html>
