<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Forgot Password — myQRID</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0f;color:white;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.bg{position:fixed;width:100%;height:100%;background:radial-gradient(circle at 20% 20%,#7c3aed55,transparent),radial-gradient(circle at 80% 60%,#ec489955,transparent),#0a0a0f;z-index:-1}
.wrap{width:100%;max-width:400px}
.logo{text-align:center;margin-bottom:40px}
.logo-text{font-size:32px;font-weight:700;color:#fff;letter-spacing:-1px}
.logo-text span{background:linear-gradient(135deg,#7c3aed,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:14px;color:rgba(255,255,255,0.35);margin-top:6px}
.card{background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:28px 24px}
.icon-wrap{text-align:center;margin-bottom:24px}
.icon-wrap i{font-size:48px;background:linear-gradient(135deg,#7c3aed,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.card-title{font-size:20px;font-weight:700;text-align:center;margin-bottom:8px}
.card-sub{font-size:14px;color:rgba(255,255,255,0.4);text-align:center;margin-bottom:24px;line-height:1.5}
.field{margin-bottom:18px}
.field-label{font-size:12px;font-weight:600;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.input{width:100%;padding:14px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:12px;color:#fff;font-family:'Inter',sans-serif;font-size:15px;outline:none;transition:border 0.2s}
.input:focus{border-color:rgba(124,58,237,0.5);background:rgba(124,58,237,0.05)}
.input::placeholder{color:rgba(255,255,255,0.2)}
.btn-reset{width:100%;padding:15px;background:linear-gradient(135deg,#7c3aed,#ec4899);color:#fff;border:none;border-radius:12px;font-family:'Inter',sans-serif;font-size:16px;font-weight:700;cursor:pointer;min-height:52px;transition:all 0.2s;box-shadow:0 4px 20px rgba(124,58,237,0.3)}
.btn-reset:active{transform:scale(0.98);opacity:0.9}
.btn-reset:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.back-link{text-align:center;margin-top:18px;font-size:14px;color:rgba(255,255,255,0.35)}
.back-link a{background:linear-gradient(135deg,#7c3aed,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;font-weight:600}
.err-box{background:rgba(255,59,92,0.08);border:1px solid rgba(255,59,92,0.25);color:#FF3B5C;padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none}
.success-box{background:rgba(0,229,160,0.08);border:1px solid rgba(0,229,160,0.25);color:#00E5A0;padding:16px;border-radius:10px;font-size:14px;margin-bottom:16px;display:none;text-align:center;line-height:1.6}
.powered{text-align:center;margin-top:32px;font-size:11px;color:rgba(255,255,255,0.12)}
</style>
</head>
<body>
<div class="bg"></div>
<div class="wrap">
  <div class="logo">
    <div class="logo-text">my<span>QRID</span></div>
    <div class="logo-sub">Password Recovery</div>
  </div>
  <div class="card">
    <div class="icon-wrap">
      <i class="fas fa-lock-open"></i>
    </div>
    <div class="card-title">Forgot Password?</div>
    <div class="card-sub">Enter your registered email address and we'll send you a reset link.</div>
    <div class="err-box" id="err"></div>
    <div class="success-box" id="successBox">
      <i class="fas fa-check-circle" style="font-size:24px;margin-bottom:8px;display:block"></i>
      Reset link sent! Check your email inbox.
    </div>
    <div id="formArea">
      <div class="field">
        <div class="field-label">Email Address</div>
        <input class="input" type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <button class="btn-reset" id="btn" onclick="doReset()">
        <i class="fas fa-paper-plane"></i> Send Reset Link
      </button>
    </div>
    <div class="back-link">
      <a href="/login.html">← Back to Login</a>
    </div>
  </div>
  <div class="powered">Powered by myQRID</div>
</div>

<script>
const API = 'https://myqrid-backend.myqrid.workers.dev';

function showErr(msg) {
  const e = document.getElementById('err');
  e.textContent = msg;
  e.style.display = 'block';
}

function clearErr() {
  document.getElementById('err').style.display = 'none';
}

async function doReset() {
  clearErr();
  const email = document.getElementById('email').value.trim();
  const btn = document.getElementById('btn');
  if (!email) { showErr('Please enter your email address'); return; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    showErr('Please enter a valid email address');
    return;
  }
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
  try {
    const res = await fetch(API + '/auth/forgot-password', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email})
    });
    const data = await res.json();
    document.getElementById('formArea').style.display = 'none';
    document.getElementById('successBox').style.display = 'block';
  } catch(e) {
    document.getElementById('formArea').style.display = 'none';
    document.getElementById('successBox').style.display = 'block';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doReset(); });
</script>
</body>
</html>
