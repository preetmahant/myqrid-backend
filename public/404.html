<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>404 — myQRID</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/glass.css">
<style>
body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.wrap{width:100%;max-width:420px;text-align:center}
.icon{font-size:80px;margin-bottom:24px;animation:float 3s ease-in-out infinite;display:block}
.code{font-size:96px;font-weight:700;background:linear-gradient(135deg,#7c3aed,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;margin-bottom:8px}
.title{font-size:22px;font-weight:700;color:#fff;margin-bottom:10px}
.sub{font-size:15px;color:rgba(255,255,255,0.4);margin-bottom:32px;line-height:1.6}
.btn-primary{display:inline-flex;align-items:center;gap:10px;padding:15px 32px;background:linear-gradient(135deg,#7c3aed,#ec4899);color:#fff;border:none;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;cursor:pointer;text-decoration:none;box-shadow:0 0 30px rgba(124,58,237,0.3);margin-bottom:12px;width:100%;justify-content:center}
.btn-ghost{display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:14px 32px;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.10);border-radius:14px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;text-decoration:none;width:100%}
</style>
</head>
<body>
<div class="bg-fixed"></div>
<div class="wrap">
  <span class="icon">⬡</span>
  <div class="code">404</div>
  <div class="title">Page Not Found</div>
  <div class="sub">The page you're looking for doesn't exist or has been moved.</div>
  <a href="/login.html" class="btn-primary">Go Home</a>
  <a href="javascript:history.back()" class="btn-ghost">← Go Back</a>
</div>
</body>
</html>
