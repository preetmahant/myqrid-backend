<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Not Found — myQRID</title>
<meta name="theme-color" content="#7C3AED">
<link rel="icon" href="/assets/myqrid-logo.png">
<link rel="stylesheet" href="/css/glass.css">
<link rel="stylesheet" href="/css/responsive.css">
<script src="/js/logo.js"></script>
<style>
body{background:#1E1008;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.err-code{font-size:6rem;font-weight:900;color:rgba(124,58,237,0.3);line-height:1;letter-spacing:-0.04em}
.err-title{font-size:1.5rem;font-weight:900;color:#fff;margin-top:8px}
.err-sub{color:rgba(255,255,255,0.4);font-size:0.9rem;margin-top:8px;margin-bottom:32px;line-height:1.5}
.err-logo{margin-bottom:24px;animation:float 3s ease-in-out infinite}
.btn-row{display:flex;flex-direction:column;gap:12px;width:100%;max-width:280px}
</style>
</head>
<body data-top="coffee" data-bottom="deep-purple">

<div class="err-logo">
  <img id="err-logo" width="72" height="72" alt="myQRID" style="object-fit:contain">
</div>

<div class="err-code">404</div>
<div class="err-title">Page not found</div>
<div class="err-sub">This myQRID page doesn't exist.<br>Check the URL or go back home.</div>

<div class="btn-row">
  <a href="/" class="btn btn-accent btn-full">Go Home</a>
  <a href="/claim.html" class="btn btn-dark-glass btn-full">Activate a QR Code</a>
</div>

<div style="margin-top:40px;color:rgba(255,255,255,0.15);font-size:0.75rem">Powered by myQRID</div>

<div id="toast-container"></div>
<script src="/js/app.js"></script>
<script>
document.getElementById('err-logo').src = MYQRID_LOGO;
</script>
</body>
</html>
