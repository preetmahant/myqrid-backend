<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin — myQRID</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0f;color:white;min-height:100vh}
.bg{position:fixed;width:100%;height:100%;background:radial-gradient(circle at 20% 20%,#7c3aed55,transparent),radial-gradient(circle at 80% 60%,#ec489955,transparent),#0a0a0f;z-index:-1}

/* LOGIN GATE */
.login-gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.gate-card{width:100%;max-width:380px;background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:32px 28px;text-align:center}
.gate-icon{font-size:48px;margin-bottom:16px}
.gate-title{font-size:22px;font-weight:700;margin-bottom:8px}
.gate-sub{font-size:14px;color:rgba(255,255,255,0.4);margin-bottom:24px}
.input{width:100%;padding:14px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:12px;color:#fff;font-family:'Inter',sans-serif;font-size:15px;outline:none;transition:border 0.2s;margin-bottom:12px}
.input:focus{border-color:rgba(124,58,237,0.5)}
.input::placeholder{color:rgba(255,255,255,0.2)}
.btn-primary{width:100%;padding:14px;background:linear-gradient(135deg,#7c3aed,#ec4899);color:#fff;border:none;border-radius:12px;font-family:'Inter',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s}
.btn-primary:active{transform:scale(0.98)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.err-box{background:rgba(255,59,92,0.08);border:1px solid rgba(255,59,92,0.25);color:#FF3B5C;padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:12px;display:none}

/* ADMIN PANEL */
.admin{display:none}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:15px 20px;padding-top:calc(15px + env(safe-area-inset-top));background:rgba(0,0,0,0.3);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.07);position:sticky;top:0;z-index:50}
.topbar-logo{font-size:18px;font-weight:700}
.topbar-logo span{background:linear-gradient(135deg,#7c3aed,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar-right{display:flex;gap:8px;align-items:center}
.admin-badge{background:rgba(255,59,92,0.15);border:1px solid rgba(255,59,92,0.3);color:#FF3B5C;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.icon-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,0.6);font-size:14px}

.content{max-width:900px;margin:0 auto;padding:20px}

/* STATS GRID */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:24px}
@media(min-width:600px){.stats-grid{grid-template-columns:repeat(4,1fr)}}
.stat-card{background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:16px;text-align:center}
.stat-num{font-size:28px;font-weight:700;background:linear-gradient(135deg,#7c3aed,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-label{font-size:11px;color:rgba(255,255,255,0.4);margin-top:4px;text-transform:uppercase;letter-spacing:0.3px}

/* SECTION */
.section{margin-bottom:24px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-title{font-size:14px;font-weight:600;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.5px}
.section-card{background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.07);border-radius:16px;overflow:hidden}

/* TABLE */
.table{width:100%;border-collapse:collapse}
.table th{padding:12px 16px;text-align:left;font-size:11px;font-weight:600;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.3px;border-bottom:1px solid rgba(255,255,255,0.06)}
.table td{padding:12px 16px;font-size:13px;border-bottom:1px solid rgba(255,255,255,0.04);color:rgba(255,255,255,0.8)}
.table tr:last-child td{border-bottom:none}
.table tr:hover td{background:rgba(255,255,255,0.03)}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:rgba(0,229,160,0.1);color:#00E5A0;border:1px solid rgba(0,229,160,0.2)}
.badge-red{background:rgba(255,59,92,0.1);color:#FF3B5C;border:1px solid rgba(255,59,92,0.2)}
.badge-purple{background:rgba(124,58,237,0.1);color:#a78bfa;border:1px solid rgba(124,58,237,0.2)}
.badge-gray{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.08)}

/* ACTION BTNS */
.btn-sm{padding:6px 12px;border-radius:8px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all 0.2s}
.btn-danger{background:rgba(255,59,92,0.15);color:#FF3B5C;border:1px solid rgba(255,59,92,0.2)}
.btn-success{background:rgba(0,229,160,0.1);color:#00E5A0;border:1px solid rgba(0,229,160,0.2)}
.btn-purple{background:rgba(124,58,237,0.15);color:#a78bfa;border:1px solid rgba(124,58,237,0.2)}

/* SEARCH */
.search-bar{display:flex;gap:10px;margin-bottom:12px}
.search-input{flex:1;padding:10px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:10px;color:#fff;font-family:'Inter',sans-serif;font-size:14px;outline:none}
.search-input:focus{border-color:rgba(124,58,237,0.4)}
.search-input::placeholder{color:rgba(255,255,255,0.2)}

/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:20px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:4px}
.tab{flex:1;padding:9px;text-align:center;border-radius:9px;cursor:pointer;font-size:13px;font-weight:500;color:rgba(255,255,255,0.4);transition:all 0.2s}
.tab.active{background:linear-gradient(135deg,#7c3aed,#ec4899);color:#fff;font-weight:600}

/* LOADING */
.loading{text-align:center;padding:40px;color:rgba(255,255,255,0.3)}
.loading i{font-size:24px;margin-bottom:8px;display:block}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(124,58,237,0.12);border:1px solid rgba(124,58,237,0.25);color:#c4b5fd;padding:12px 24px;border-radius:50px;font-size:14px;font-weight:600;z-index:999;opacity:0;transition:all 0.3s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="bg"></div>

<!-- LOGIN GATE -->
<div class="login-gate" id="loginGate">
  <div class="gate-card">
    <div class="gate-icon">🛡️</div>
    <div class="gate-title">Admin Access</div>
    <div class="gate-sub">Enter admin password to continue</div>
    <div class="err-box" id="gateErr"></div>
    <input class="input" type="password" id="adminPass" placeholder="Admin password" autocomplete="off">
    <button class="btn-primary" onclick="doAdminLogin()">
      <i class="fas fa-sign-in-alt"></i> Access Admin Panel
    </button>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="admin" id="adminPanel">
  <div class="topbar">
    <div class="topbar-logo">my<span>QRID</span> <span style="color:rgba(255,255,255,0.3);font-size:14px">Admin</span></div>
    <div class="topbar-right">
      <span class="admin-badge">ADMIN</span>
      <div class="icon-btn" onclick="doAdminLogout()" title="Logout"><i class="fas fa-power-off"></i></div>
    </div>
  </div>

  <div class="content">

    <!-- TABS -->
    <div class="tabs">
      <div class="tab active" onclick="switchTab('overview')">Overview</div>
      <div class="tab" onclick="switchTab('users')">Users</div>
      <div class="tab" onclick="switchTab('tags')">Tags</div>
      <div class="tab" onclick="switchTab('logs')">Logs</div>
    </div>

    <!-- OVERVIEW TAB -->
    <div id="tab-overview">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-num" id="stat-users">—</div>
          <div class="stat-label">Total Users</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="stat-tags">—</div>
          <div class="stat-label">Total Tags</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="stat-claimed">—</div>
          <div class="stat-label">Claimed Tags</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="stat-scans">—</div>
          <div class="stat-label">Total Scans</div>
        </div>
      </div>

      <div class="section">
        <div class="section-header">
          <div class="section-title">Recent Users</div>
        </div>
        <div class="section-card">
          <div id="recentUsers" class="loading">
            <i class="fas fa-spinner fa-spin"></i>
            Loading...
          </div>
        </div>
      </div>
    </div>

    <!-- USERS TAB -->
    <div id="tab-users" style="display:none">
      <div class="section">
        <div class="search-bar">
          <input class="search-input" type="text" id="userSearch" placeholder="Search by username or email..." oninput="filterUsers()">
        </div>
        <div class="section-card">
          <div id="usersTable" class="loading">
            <i class="fas fa-spinner fa-spin"></i>
            Loading users...
          </div>
        </div>
      </div>
    </div>

    <!-- TAGS TAB -->
    <div id="tab-tags" style="display:none">
      <div class="section">
        <div class="section-header">
          <div class="section-title">QR Tags</div>
          <button class="btn-sm btn-purple" onclick="generateTags()">
            <i class="fas fa-plus"></i> Generate Tags
          </button>
        </div>
        <div class="section-card">
          <div id="tagsTable" class="loading">
            <i class="fas fa-spinner fa-spin"></i>
            Loading tags...
          </div>
        </div>
      </div>
    </div>

    <!-- LOGS TAB -->
    <div id="tab-logs" style="display:none">
      <div class="section">
        <div class="section-card">
          <div id="logsTable" class="loading">
            <i class="fas fa-spinner fa-spin"></i>
            Loading logs...
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://myqrid-backend.myqrid.workers.dev';
let adminPassword = '';
let allUsers = [];

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function doAdminLogin() {
  const pass = document.getElementById('adminPass').value;
  if (!pass) return;
  adminPassword = pass;
  sessionStorage.setItem('admin_pass', pass);
  document.getElementById('loginGate').style.display = 'none';
  document.getElementById('adminPanel').style.display = 'block';
  loadOverview();
}

function doAdminLogout() {
  sessionStorage.removeItem('admin_pass');
  adminPassword = '';
  document.getElementById('adminPanel').style.display = 'none';
  document.getElementById('loginGate').style.display = 'flex';
  document.getElementById('adminPass').value = '';
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    const tabs = ['overview','users','tags','logs'];
    t.classList.toggle('active', tabs[i] === tab);
  });
  ['overview','users','tags','logs'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === tab ? 'block' : 'none';
  });
  if (tab === 'users') loadUsers();
  if (tab === 'tags') loadTags();
  if (tab === 'logs') loadLogs();
}

function adminHeaders() {
  return { 'Content-Type': 'application/json', 'x-admin-password': adminPassword };
}

async function loadOverview() {
  try {
    const res = await fetch(API + '/api/admin/inventory', { headers: adminHeaders() });
    const data = await res.json();
    if (data.tags) {
      document.getElementById('stat-users').textContent = data.users?.total ?? '—';
      document.getElementById('stat-tags').textContent = data.tags?.total ?? '—';
      document.getElementById('stat-claimed').textContent = data.tags?.claimed ?? '—';
      document.getElementById('stat-scans').textContent = '0';
    }
  } catch(e) {
    document.getElementById('stat-users').textContent = '—';
  }

  // Recent users
  try {
    const res = await fetch(API + '/api/admin/inventory/tags?limit=5', { headers: adminHeaders() });
    const data = await res.json();
    renderRecentUsers(data.tags || []);
  } catch(e) {
    document.getElementById('recentUsers').innerHTML = '<div style="padding:20px;text-align:center;color:rgba(255,255,255,0.3)">No data available</div>';
  }
}

function renderRecentUsers(items) {
  if (!items.length) {
    document.getElementById('recentUsers').innerHTML = '<div style="padding:20px;text-align:center;color:rgba(255,255,255,0.3)">No users yet</div>';
    return;
  }
  const rows = items.map(item => `
    <tr>
      <td>${item.internalSlug || '—'}</td>
      <td>${item.category || '—'}</td>
      <td><span class="badge ${item.status === 'claimed' ? 'badge-green' : 'badge-gray'}">${item.status || 'unclaimed'}</span></td>
      <td>${item.createdAt ? new Date(item.createdAt).toLocaleDateString() : '—'}</td>
    </tr>
  `).join('');
  document.getElementById('recentUsers').innerHTML = `
    <table class="table">
      <thead><tr><th>Slug</th><th>Category</th><th>Status</th><th>Created</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

async function loadUsers() {
  document.getElementById('usersTable').innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading...</div>';
  try {
    const res = await fetch(API + '/api/admin/users/export', { headers: adminHeaders() });
    const text = await res.text();
    const lines = text.trim().split('\n');
    if (lines.length <= 1) {
      document.getElementById('usersTable').innerHTML = '<div style="padding:20px;text-align:center;color:rgba(255,255,255,0.3)">No users found</div>';
      return;
    }
    const headers = lines[0].split(',');
    allUsers = lines.slice(1).map(line => {
      const vals = line.split(',');
      const obj = {};
      headers.forEach((h,i) => obj[h] = vals[i] || '');
      return obj;
    });
    renderUsersTable(allUsers);
  } catch(e) {
    document.getElementById('usersTable').innerHTML = '<div style="padding:20px;text-align:center;color:rgba(255,255,255,0.3)">Error loading users</div>';
  }
}

function renderUsersTable(users) {
  if (!users.length) {
    document.getElementById('usersTable').innerHTML = '<div style="padding:20px;text-align:center;color:rgba(255,255,255,0.3)">No users found</div>';
    return;
  }
  const rows = users.map(u => `
    <tr>
      <td><strong>@${u.username || '—'}</strong></td>
      <td>${u.displayName || '—'}</td>
      <td style="color:rgba(255,255,255,0.5)">${u.email || '—'}</td>
      <td><span class="badge ${u.plan === 'pro' ? 'badge-purple' : 'badge-gray'}">${u.plan || 'free'}</span></td>
      <td><span class="badge ${u.status === 'active' ? 'badge-green' : 'badge-red'}">${u.status || 'active'}</span></td>
    </tr>
  `).join('');
  document.getElementById('usersTable').innerHTML = `
    <table class="table">
      <thead><tr><th>Username</th><th>Name</th><th>Email</th><th>Plan</th><th>Status</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function filterUsers() {
  const q = document.getElementById('userSearch').value.toLowerCase();
  const filtered = allUsers.filter(u =>
    (u.username || '').toLowerCase().includes(q) ||
    (u.email || '').toLowerCase().includes(q) ||
    (u.displayName || '').toLowerCase().includes(q)
  );
  renderUsersTable(filtered);
}

async function loadTags() {
  document.getElementById('tagsTable').innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading...</div>';
  try {
    const res = await fetch(API + '/api/admin/inventory/tags', { headers: adminHeaders() });
    const data = await res.json();
    const tags = data.tags || [];
    if (!tags.length) {
      document.getElementById('tagsTable').innerHTML = '<div style="padding:20px;text-align:center;color:rgba(255,255,255,0.3)">No tags generated yet</div>';
      return;
    }
    const rows = tags.map(t => `
      <tr>
        <td><code style="font-size:12px;color:#a78bfa">${t.slugOnly || t.internalSlug || '—'}</code></td>
        <td>${t.category || '—'}</td>
        <td><span class="badge ${t.status === 'claimed' ? 'badge-green' : 'badge-gray'}">${t.status || '—'}</span></td>
        <td>${t.batchId || '—'}</td>
        <td>${t.createdAt ? new Date(t.createdAt).toLocaleDateString() : '—'}</td>
      </tr>
    `).join('');
    document.getElementById('tagsTable').innerHTML = `
      <table class="table">
        <thead><tr><th>Slug</th><th>Category</th><th>Status</th><th>Batch</th><th>Created</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  } catch(e) {
    document.getElementById('tagsTable').innerHTML = '<div style="padding:20px;text-align:center;color:rgba(255,255,255,0.3)">Error loading tags</div>';
  }
}

async function loadLogs() {
  document.getElementById('logsTable').innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading...</div>';
  document.getElementById('logsTable').innerHTML = '<div style="padding:20px;text-align:center;color:rgba(255,255,255,0.3)">Audit logs coming soon</div>';
}

async function generateTags() {
  const category = prompt('Category (pet/help/safe/asset):');
  if (!category) return;
  const count = prompt('How many tags? (max 10):');
  if (!count) return;
  showToast('Generating tags...');
  try {
    const res = await fetch(API + '/api/admin/qr/generate', {
      method: 'POST',
      headers: adminHeaders(),
      body: JSON.stringify({ count: parseInt(count), category, batchName: 'admin-' + Date.now() })
    });
    const data = await res.json();
    if (data.success) {
      showToast('✅ ' + data.count + ' tags generated!');
      loadTags();
    } else {
      showToast('❌ ' + (data.error || 'Failed'));
    }
  } catch(e) {
    showToast('❌ Network error');
  }
}

// Auto login if session exists
const savedPass = sessionStorage.getItem('admin_pass');
if (savedPass) {
  adminPassword = savedPass;
  document.getElementById('loginGate').style.display = 'none';
  document.getElementById('adminPanel').style.display = 'block';
  loadOverview();
}

document.getElementById('adminPass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doAdminLogin();
});
</script>
</body>
</html>
