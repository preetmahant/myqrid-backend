<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Links — myQRID</title>
<meta name="theme-color" content="#7C3AED">
<link rel="icon" href="/assets/myqrid-logo.png">
<link rel="stylesheet" href="/css/glass.css">
<link rel="stylesheet" href="/css/responsive.css">
<script src="/js/logo.js"></script>
<style>
body{background:#1E1008;min-height:100dvh}
.top-strip{position:fixed;top:0;left:0;right:0;height:var(--top-height);min-height:var(--top-min-height);background-color:var(--top-bg);background-image:linear-gradient(var(--top-check-color) 1px,transparent 1px),linear-gradient(90deg,var(--top-check-color) 1px,transparent 1px);background-size:var(--top-check-size) var(--top-check-size);z-index:0}
.bottom-panel{position:fixed;bottom:0;left:0;right:0;top:calc(var(--top-height) - var(--panel-radius));background:var(--panel-bg);border-radius:var(--panel-radius) var(--panel-radius) 0 0;z-index:1}
.page{position:relative;z-index:10;padding:0 16px;padding-bottom:calc(var(--bottom-nav-h) + var(--safe-bottom) + 24px)}
.page-header{padding-top:calc(var(--top-height) + 16px);display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.page-title{font-size:1.4rem;font-weight:900;color:#fff}
.link-item{display:flex;align-items:center;gap:12px;padding:14px 16px;background:rgba(0,0,0,0.25);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border:1px solid rgba(255,255,255,0.08);border-radius:14px;margin-bottom:10px;transition:all 0.2s}
.link-item-icon{font-size:1.4rem;width:40px;height:40px;border-radius:10px;background:var(--glass-purple);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.link-item-info{flex:1;min-width:0}
.link-item-title{font-size:0.95rem;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.link-item-url{font-size:0.75rem;color:rgba(255,255,255,0.35);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.link-item-actions{display:flex;gap:8px;flex-shrink:0;align-items:center}
.action-btn{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:0.9rem;color:rgba(255,255,255,0.6);transition:all 0.2s}
.action-btn:hover{background:rgba(255,255,255,0.12);color:#fff}
.action-btn.delete:hover{background:rgba(255,59,92,0.15);border-color:rgba(255,59,92,0.3);color:#FF3B5C}
.add-btn{display:flex;align-items:center;justify-content:center;gap:10px;padding:16px;background:var(--accent-dim);border:1px dashed var(--accent-border);border-radius:14px;color:#DDD6FE;font-weight:700;font-size:0.95rem;cursor:pointer;transition:all 0.2s;margin-top:8px;width:100%}
.add-btn:hover{background:rgba(124,58,237,0.25)}
.empty-state{text-align:center;padding:48px 24px;color:rgba(255,255,255,0.3)}
.empty-icon{font-size:3rem;margin-bottom:16px}
.empty-text{font-size:0.9rem;line-height:1.5}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:1000;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal-sheet{background:linear-gradient(170deg,#2a0550,#1E0A3C);border:1px solid rgba(255,255,255,0.10);border-radius:24px 24px 0 0;padding:24px 20px;padding-bottom:calc(24px + var(--safe-bottom));width:100%;max-width:480px;animation:slideUp 0.35s ease}
.modal-handle{width:40px;height:4px;background:rgba(255,255,255,0.2);border-radius:2px;margin:0 auto 20px}
.modal-title{font-size:1.1rem;font-weight:800;color:#fff;margin-bottom:20px}
.form-col{display:flex;flex-direction:column;gap:14px}
.quick-add-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.quick-add-chip{padding:8px 14px;border-radius:20px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.10);color:rgba(255,255,255,0.7);font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:6px}
.quick-add-chip:hover{background:var(--accent-dim);border-color:var(--accent-border);color:#DDD6FE}
.link-count{font-size:0.78rem;color:rgba(255,255,255,0.3);margin-bottom:16px}
</style>
</head>
<body data-top="coffee" data-bottom="deep-purple">

<div class="top-strip"></div>
<div class="bottom-panel"></div>

<div class="page">
  <div class="page-header">
    <div>
      <div class="page-title">My Links</div>
      <div class="link-count" id="link-count">0 links</div>
    </div>
    <button class="btn btn-accent" onclick="openModal()" style="padding:0 16px;min-height:40px;font-size:0.85rem">+ Add</button>
  </div>

  <!-- Quick add row -->
  <div class="quick-add-row">
    <div class="quick-add-chip" onclick="quickAdd('whatsapp')">💬 WhatsApp</div>
    <div class="quick-add-chip" onclick="quickAdd('instagram')">📸 Instagram</div>
    <div class="quick-add-chip" onclick="quickAdd('youtube')">▶ YouTube</div>
    <div class="quick-add-chip" onclick="quickAdd('linkedin')">💼 LinkedIn</div>
    <div class="quick-add-chip" onclick="quickAdd('website')">🌐 Website</div>
  </div>

  <div id="links-list"></div>
  <button class="add-btn" onclick="openModal()">+ Add New Link</button>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <button class="bottom-nav-item" onclick="window.location.href='/dashboard.html'">
    <span class="nav-icon">🏠</span><span>Home</span>
  </button>
  <button class="bottom-nav-item active" data-nav="links">
    <span class="nav-icon">🔗</span><span>Links</span>
  </button>
  <button class="bottom-nav-item nav-center">
    <div class="nav-center-btn" onclick="window.location.href='/dashboard.html'">
      <img id="nav-logo" width="28" height="28" alt="Q" style="object-fit:contain">
    </div>
  </button>
  <button class="bottom-nav-item" onclick="window.location.href='/dashboard.html#stats'">
    <span class="nav-icon">📊</span><span>Stats</span>
  </button>
  <button class="bottom-nav-item" onclick="window.location.href='/dashboard.html#settings'">
    <span class="nav-icon">⚙</span><span>Settings</span>
  </button>
</nav>

<!-- Add Link Modal -->
<div class="modal-overlay" id="link-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">Add New Link</div>
    <div class="form-col">
      <div class="input-group">
        <label class="input-label">Icon (emoji)</label>
        <input id="link-icon" class="input" type="text" placeholder="🔗" maxlength="2" style="font-size:1.5rem;text-align:center">
      </div>
      <div class="input-group">
        <label class="input-label">Title</label>
        <input id="link-title" class="input" type="text" placeholder="My Website">
      </div>
      <div class="input-group">
        <label class="input-label">URL</label>
        <input id="link-url" class="input" type="url" placeholder="https://">
      </div>
      <button class="btn btn-accent btn-full" onclick="saveLink()">Save Link</button>
      <button class="btn btn-ghost btn-full" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/app.js"></script>
<script>
if (!requireAuth()) {}
document.getElementById('nav-logo').src = MYQRID_LOGO;
Theme.load();

let links = [];
let editingId = null;

const QUICK = {
  whatsapp:  { icon:'💬', title:'WhatsApp', url:'https://wa.me/' },
  instagram: { icon:'📸', title:'Instagram', url:'https://instagram.com/' },
  youtube:   { icon:'▶',  title:'YouTube',   url:'https://youtube.com/@' },
  linkedin:  { icon:'💼', title:'LinkedIn',  url:'https://linkedin.com/in/' },
  website:   { icon:'🌐', title:'Website',   url:'https://' },
};

async function loadLinks() {
  const { ok, data } = await apiFetch('/links');
  if (!ok) return;
  links = data || [];
  renderLinks();
}

function renderLinks() {
  const list = document.getElementById('links-list');
  document.getElementById('link-count').textContent = `${links.length} link${links.length !== 1 ? 's' : ''}`;
  if (!links.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🔗</div><div class="empty-text">No links yet.<br>Add your first link above!</div></div>`;
    return;
  }
  list.innerHTML = '';
  links.forEach(l => {
    const div = document.createElement('div');
    div.className = 'link-item stagger';
    div.innerHTML = `
      <div class="link-item-icon">${l.icon||'🔗'}</div>
      <div class="link-item-info">
        <div class="link-item-title">${l.title}</div>
        <div class="link-item-url">${l.url}</div>
      </div>
      <div class="link-item-actions">
        <button class="action-btn" onclick="editLink(${l.id},'${l.icon||'🔗'}','${encodeURIComponent(l.title)}','${encodeURIComponent(l.url)}')">✎</button>
        <button class="action-btn delete" onclick="deleteLink(${l.id})">🗑</button>
      </div>`;
    list.appendChild(div);
  });
}

function openModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Add New Link';
  document.getElementById('link-icon').value = '';
  document.getElementById('link-title').value = '';
  document.getElementById('link-url').value = '';
  document.getElementById('link-modal').classList.add('open');
}

function editLink(id, icon, title, url) {
  editingId = id;
  document.getElementById('modal-title').textContent = 'Edit Link';
  document.getElementById('link-icon').value = icon;
  document.getElementById('link-title').value = decodeURIComponent(title);
  document.getElementById('link-url').value = decodeURIComponent(url);
  document.getElementById('link-modal').classList.add('open');
}

function quickAdd(type) {
  const q = QUICK[type];
  document.getElementById('link-icon').value = q.icon;
  document.getElementById('link-title').value = q.title;
  document.getElementById('link-url').value = q.url;
  document.getElementById('link-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('link-modal').classList.remove('open');
  editingId = null;
}

async function saveLink() {
  const icon = document.getElementById('link-icon').value.trim() || '🔗';
  const title = document.getElementById('link-title').value.trim();
  const url = document.getElementById('link-url').value.trim();
  if (!title || !url) { toast('Title and URL required', 'error'); return; }
  const method = editingId ? 'PUT' : 'POST';
  const path = editingId ? `/links/${editingId}` : '/links';
  const { ok, data } = await apiFetch(path, { method, body: JSON.stringify({ icon, title, url }) });
  if (ok) {
    if (editingId) { links = links.map(l => l.id === editingId ? data : l); }
    else { links.push(data); }
    renderLinks();
    closeModal();
    toast(editingId ? 'Link updated!' : 'Link added!', 'success');
  } else {
    toast('Failed to save link', 'error');
  }
}

async function deleteLink(id) {
  if (!confirm('Delete this link?')) return;
  const { ok } = await apiFetch(`/links/${id}`, { method: 'DELETE' });
  if (ok) { links = links.filter(l => l.id !== id); renderLinks(); toast('Deleted', 'success'); }
  else toast('Delete failed', 'error');
}

document.getElementById('link-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

loadLinks();
</script>
</body>
</html>
